services:
  reranker:
    image: vllm/vllm-openai:v0.14.0
    container_name: qwen3reranker
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE_IDS}
      - HF_HOME=/model_cache
    volumes:
      - ${HF_HOME}:/model_cache
    ports:
      - "${PORT}:8000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "${GPU_DEVICE_IDS}" ]
              capabilities: [ gpu ]
    command: >
      ${MODEL_ID}
      --served-model-name ${MODEL_NAME}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.95}
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --runner pooling
      --trust-remote-code
      --dtype auto
      --max-model-len ${MAX_MODEL_LEN:-auto}
    restart: always
