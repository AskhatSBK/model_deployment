version: '3.8'

services:
  llm:
    image: vllm/vllm-openai:v0.13.0
    container_name: gptoss-120b
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE_IDS}
      - TIKTOKEN_RS_CACHE_DIR=/root/.cache/harmony_cache
      - HF_HOME=/model_cache
    volumes:
      - /data/models/harmony_cache:/root/.cache/harmony_cache
      - ${HF_HOME}:/model_cache
    ports:
      - "${PORT}:8000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "${GPU_DEVICE_IDS}" ]
              capabilities: [ gpu ]
 
    command: >
      ${MODEL_ID}
      --served-model-name ${MODEL_NAME}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.95}
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --max-model-len ${MAX_MODEL_LEN:-8192}
      --dtype ${DTYPE:-auto}

    restart: always

